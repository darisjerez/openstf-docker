apiVersion: 1

groups:
  - orgId: 1
    name: spotify-battery-alerts
    folder: Spotify & Battery
    interval: 1m
    rules:
      - uid: low-battery-alert
        title: Low Battery
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: device_battery_level
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 15
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Battery below 15% on {{ $labels.model }} ({{ $labels.serial }})"

      - uid: critical-battery-alert
        title: Critical Battery
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: device_battery_level
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 10
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "CRITICAL: Battery below 10% on {{ $labels.model }} ({{ $labels.serial }})"

      - uid: device-offline-alert
        title: Device Offline
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: device_online
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Device offline for >5 min: {{ $labels.model }} ({{ $labels.serial }})"

      - uid: healer-errors-alert
        title: Healer Error Spike
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: increase(spotify_healer_errors_total[10m])
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 3
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 0s
        labels:
          severity: warning
        annotations:
          summary: "Healer errors spiking on {{ $labels.model }} ({{ $labels.serial }}): {{ $values.A }} errors in 10m"

      - uid: scrape-target-down
        title: Scrape Target Down
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: up
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: lt
                    params:
                      - 1
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target down: {{ $labels.job }} ({{ $labels.instance }})"

      - uid: spotify-heal-event
        title: Spotify Heal Event
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: dfcz47nsq0gzkd
            model:
              expr: increase(spotify_healer_heals_total[5m])
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 0
                  operator:
                    type: and
                  reducer:
                    type: last
              refId: C
        for: 0s
        labels:
          severity: info
        annotations:
          summary: "Spotify healed on {{ $labels.model }} ({{ $labels.serial }}) — {{ $labels.action }}"

contactPoints:
  - orgId: 1
    name: grafana-default-email
    receivers:
      - uid: default-email
        type: email
        settings:
          addresses: dj@digitalpathrd.com

policies:
  - orgId: 1
    receiver: grafana-default-email
