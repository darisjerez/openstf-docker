name: Publish images to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to "latest" plus git sha)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: openstf-exporter
            context: .
            dockerfile: exporter/Dockerfile
          - name: openstf-healer
            context: .
            dockerfile: healer/Dockerfile
          - name: openstf-monitor
            context: .
            dockerfile: monitor/Dockerfile
          - name: openstf-device-info
            context: .
            dockerfile: device-info/Dockerfile
          - name: openstf-wall
            context: wall
            dockerfile: wall/Dockerfile
          - name: openstf-wall-bridge
            context: wall
            dockerfile: wall/Dockerfile.bridge
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          IMAGE="${REGISTRY}/${OWNER}/${{ matrix.name }}"
          SHA_SHORT="${GITHUB_SHA::7}"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest,${IMAGE}:sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          else
            INPUT_TAG="${{ github.event.inputs.tag || 'latest' }}"
            echo "tags=${IMAGE}:${INPUT_TAG},${IMAGE}:sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
