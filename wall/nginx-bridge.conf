events {}

http {
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Bridge-network resolver — Docker's embedded DNS for service names.
  resolver 127.0.0.11 valid=30s;

  server {
    listen 80;

    # Portal page (exact match for root only)
    location = / {
      root /usr/share/nginx/html;
      try_files /portal.html =404;
    }

    # STF UI (for iframe embed)
    location /stf/ {
      proxy_pass http://stf:7100/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }

    # PWA manifest
    location = /manifest.json {
      root /usr/share/nginx/html;
    }

    # PWA icons
    location /icons/ {
      root /usr/share/nginx/html;
    }

    # PWA service worker
    location = /service-worker.js {
      root /usr/share/nginx/html;
      add_header Service-Worker-Allowed /;
    }

    # Device wall
    location /wall {
      root /usr/share/nginx/html;
      index index.html;
    }

    # Grafana (sub-path mode)
    location /grafana/ {
      proxy_pass http://grafana:3000;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Spotify healer API
    location /healer/ {
      proxy_pass http://spotify-healer:9106/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Device info API
    location /device-info/ {
      proxy_pass http://device-info:9109/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Device monitor API
    location /monitor/ {
      proxy_pass http://device-monitor:9107/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }

    # Screen WS streams — provider ports live inside the stf container
    location ~ ^/screen/(\d+)$ {
      set $screen_port $1;
      rewrite ^ / break;
      proxy_pass http://stf:$screen_port;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 86400;
    }

    # Default: proxy everything else to STF
    location / {
      proxy_pass http://stf:7100;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_read_timeout 86400;
    }
  }
}
